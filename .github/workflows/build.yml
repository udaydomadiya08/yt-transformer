name: Build All Platforms

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r desktop-app/requirements.txt
          pip install pyinstaller

      - name: Install linuxdeploy (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sL "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -o /tmp/linuxdeploy
          chmod +x /tmp/linuxdeploy

      - name: Install UPX
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install upx
          elif [ "${{ runner.os }}" = "Windows" ]; then
            curl -sL "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -o /tmp/upx.zip
            unzip -o /tmp/upx.zip -d /tmp/upx
            echo "/tmp/upx/upx-4.2.4-win64" >> $GITHUB_PATH
          else
            sudo apt-get install -y upx-ucl
          fi

      - name: Build app
        working-directory: desktop-app
        run: python build.py

      - name: Build CLI binary
        working-directory: desktop-app
        run: python build.py --cli-only

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTTransformer-${{ runner.os }}
          path: |
            desktop-app/dist/*.dmg
            desktop-app/dist/*.exe
            desktop-app/dist/*.zip
            desktop-app/dist/*.tar.gz
            desktop-app/dist/*.AppImage
            desktop-app/dist/*-cli*
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: YTTransformer-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.dmg
            **/*.exe
            **/*.zip
            **/*.AppImage
            **/*.tar.gz
            **/*-cli*
          generate_release_notes: true
